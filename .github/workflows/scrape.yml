name: 台灣主動式 ETF 籌碼與法人數據自動抓取

on:
  schedule:
    # 台灣時間下午 17:00 執行 (UTC 時間 09:00)
    - cron: '0 9 * * 1-5'
  workflow_dispatch: # 允許手動點擊執行測試

jobs:
  scrape-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 下載專案程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝相依套件
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 執行爬蟲與分析模組
        env:
          FIREBASE_CRED_JSON: ${{ secrets.FIREBASE_CRED_JSON }}
          FIREBASE_RTDB_URL: ${{ secrets.FIREBASE_RTDB_URL }}
        run: |
          python main.py
